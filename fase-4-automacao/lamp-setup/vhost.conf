# portfolio.conf — Virtual Host Apache para aplicação Python
# Fase 4 — Linux SysAdmin Portfolio
#
# Ativar:   sudo a2ensite portfolio.conf && sudo systemctl reload apache2
# Desativar: sudo a2dissite portfolio.conf && sudo systemctl reload apache2
# Testar:   sudo apache2ctl configtest

# ─── VIRTUAL HOST ────────────────────────────────────────────
# Cada bloco VirtualHost define um site independente no Apache.
# *:80 significa: atende qualquer IP na porta 80 (HTTP)

<VirtualHost *:80>

    ServerName localhost
    # Domínio que este bloco atende
    # Em produção: ServerName meusite.com

    ServerAdmin john@localhost
    # Email do administrador — aparece em páginas de erro

    DocumentRoot /var/www/portfolio
    # Diretório raiz dos arquivos do site

    # ─── MOD_WSGI ────────────────────────────────────────────
    # WSGIScriptAlias mapeia uma URL para um arquivo Python WSGI
    # "/" significa: qualquer requisição vai para app.py
    WSGIScriptAlias / /var/www/portfolio/app.py

    # ─── PERMISSÕES DE ACESSO ────────────────────────────────
    <Directory /var/www/portfolio>
        Require all granted
        # Permite acesso de qualquer origem
        # Em produção restringir com: Require ip 192.168.1.0/24
    </Directory>

    # ─── LOGS ────────────────────────────────────────────────
    # Logs separados por aplicação facilitam o troubleshooting
    # Checar erros:  sudo tail -f /var/log/apache2/portfolio-error.log
    # Checar acessos: sudo tail -f /var/log/apache2/portfolio-access.log
    ErrorLog ${APACHE_LOG_DIR}/portfolio-error.log
    CustomLog ${APACHE_LOG_DIR}/portfolio-access.log combined

</VirtualHost>

# ─── REFERÊNCIAS ─────────────────────────────────────────────
# /etc/apache2/sites-available/  → sites disponíveis (configs)
# /etc/apache2/sites-enabled/    → sites ativos (symlinks)
# sudo a2ensite                  → ativa um site
# sudo a2dissite                 → desativa um site
# sudo apache2ctl configtest     → valida a sintaxe da config
# sudo systemctl reload apache2  → aplica mudanças sem derrubar

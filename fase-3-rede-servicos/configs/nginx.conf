# nginx.conf — configuração comentada para estudo
# Fase 3 — Linux SysAdmin Portfolio
#
# Este arquivo documenta as principais diretivas do nginx
# com explicações de cada bloco para referência futura.

# ─── BLOCO GLOBAL ────────────────────────────────────────────
# Configurações que afetam o nginx como um todo

user www-data;
# Usuário do sistema que roda os processos worker
# www-data é o padrão no Ubuntu — nunca rodar como root

worker_processes auto;
# Número de processos worker — "auto" usa um por CPU disponível
# Em servidor com 4 CPUs → 4 workers

error_log /var/log/nginx/error.log;
# Onde registrar erros do servidor

pid /run/nginx.pid;
# Arquivo que guarda o PID do processo master

# ─── BLOCO EVENTS ────────────────────────────────────────────
# Configurações de conexão

events {
    worker_connections 1024;
    # Máximo de conexões simultâneas por worker
    # Com 4 workers → 4096 conexões simultâneas no total
}

# ─── BLOCO HTTP ──────────────────────────────────────────────
# Configurações do servidor web

http {

    # Tipos de arquivo que o nginx conhece
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Formato do log de acesso
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    # Registra cada requisição — útil para troubleshooting

    sendfile on;
    # Otimização: envia arquivos direto do disco sem passar pela RAM

    keepalive_timeout 65;
    # Mantém conexão aberta por 65 segundos aguardando novas requisições

    # ─── SERVIDOR VIRTUAL (virtual host) ─────────────────────
    # Cada bloco "server" representa um site/domínio

    server {
        listen 80;
        # Escuta na porta 80 (HTTP)
        # Para HTTPS seria: listen 443 ssl;

        server_name localhost;
        # Domínio que esse bloco atende
        # Em produção: server_name meusite.com www.meusite.com;

        root /var/www/html;
        # Diretório raiz dos arquivos do site

        index index.html index.htm;
        # Arquivo padrão quando acessam só o domínio

        # ─── BLOCO LOCATION ──────────────────────────────────
        # Define como tratar cada tipo de requisição

        location / {
            try_files $uri $uri/ =404;
            # Tenta servir o arquivo → depois o diretório → senão 404
        }

        # Bloco para arquivos estáticos (imagens, CSS, JS)
        location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
            expires 30d;
            # Cache de 30 dias no navegador — melhora performance
        }

        # Página de erro customizada
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # Para adicionar outro site, basta criar outro bloco server:
    #
    # server {
    #     listen 80;
    #     server_name outrosite.com;
    #     root /var/www/outrosite;
    #     ...
    # }
}

# ─── REFERÊNCIAS ─────────────────────────────────────────────
# man nginx
# /etc/nginx/nginx.conf         → configuração principal do sistema
# /etc/nginx/sites-available/   → sites disponíveis
# /etc/nginx/sites-enabled/     → sites ativos (symlinks)
# /var/log/nginx/access.log     → log de acessos
# /var/log/nginx/error.log      → log de erros
# /var/www/html/                → diretório padrão dos arquivos
